runConfig:
  minInstances: 0

env:
  # Production app URL — update when custom domain is attached in Firebase Console.
  - variable: NEXT_PUBLIC_APP_URL
    value: https://signtoseal.com
    availability:
      - BUILD
      - RUNTIME

  # Live Stripe publishable key — set in Cloud Secret Manager (never commit pk_live_*).
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secret: STRIPE_PUBLISHABLE_KEY

  # Live Stripe price IDs — create in Stripe Dashboard (live mode) and set here or via secrets.
  - variable: STRIPE_PRICE_STARTER
    secret: STRIPE_PRICE_STARTER

  - variable: STRIPE_PRICE_PRO
    secret: STRIPE_PRICE_PRO

  - variable: STRIPE_PRICE_TEAM
    secret: STRIPE_PRICE_TEAM

  # Verified Resend domain sender — e.g. SignToSeal <signing@signtoseal.com>
  - variable: RESEND_FROM_EMAIL
    secret: RESEND_FROM_EMAIL

  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY

  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY

  # Optional: Sentry DSN for production error monitoring.
  # Re-enable by creating the SENTRY_DSN secret then uncommenting:
  #   firebase apphosting:secrets:set SENTRY_DSN --project docsyousign --force --data-file -
  # - variable: NEXT_PUBLIC_SENTRY_DSN
  #   secret: SENTRY_DSN
  # - variable: SENTRY_DSN
  #   secret: SENTRY_DSN
